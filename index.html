<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сімейний контроль фізкультури</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero card">
        <p class="chip">Сімейний трекер</p>
        <h1>Фізкультура: Віктор і Лукян</h1>
        <p class="subtitle">
          База на день: <strong>10 віджимань</strong>, <strong>20 присідань</strong>,
          <strong>25 прес</strong>, <strong>10 підстрибувань</strong>, <strong>5 кіл</strong>.
        </p>
      </header>

      <section class="card">
        <div class="role-line">
          <h2>Хто ти?</h2>
          <span id="roleLockBadge" class="lock-badge hidden">Роль зафіксована</span>
        </div>
        <select id="roleSelect">
          <option value="">Оберіть роль</option>
          <option value="father">Батько</option>
          <option value="viktor">Віктор</option>
          <option value="lukyan">Лукян</option>
        </select>
      </section>

      <section class="card hidden" id="childPanel">
        <h2 id="childTitle">Панель сина</h2>

        <label for="daySelect">День:</label>
        <select id="daySelect"></select>

        <p id="debtInfo" class="debt-info"></p>

        <h3>Підтверди виконані вправи</h3>
        <ul class="exercise-list" id="exerciseList"></ul>

        <label for="proofFile">Додай підтвердження (фото/відео, необов'язково):</label>
        <input id="proofFile" type="file" accept="image/*,video/*" />

        <button id="submitBtn">Надіслати батькові</button>
        <p id="childMessage" class="message"></p>
      </section>

      <section class="card hidden" id="fatherPanel">
        <div class="father-top">
          <h2>Панель батька</h2>
          <div id="fatherNotification" class="notification">🔔 Нових повідомлень: 0</div>
        </div>
        <ul id="incomingList" class="incoming-list"></ul>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>День</th>
                <th>Віктор</th>
                <th>Лукян</th>
              </tr>
            </thead>
            <tbody id="statusTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
